name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Static export
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm build:static
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_action.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry GitHub Pages deploy
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 45
      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry_action
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
      - name: Verify deployment succeeded
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_action.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after retry."
          exit 1
